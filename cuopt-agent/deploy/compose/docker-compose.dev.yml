#
# Dev compose for cuOpt NAT agent with UI.
#
# Start everything (serve mode):
#   docker compose -f deploy/compose/docker-compose.dev.yml up -d
#   docker exec -it cuopt-agent-dev bash
#   nat serve --config_file configs/config-deepagent.yml --host 0.0.0.0
#
# Run evaluation (from inside the dev container):
#   nat eval --config_file configs/config-deepagent-eval.yml
#
# Open the UI at http://localhost:3000
# Open Phoenix tracing at http://localhost:6006

x-agent-common: &agent-common
  build:
    context: ../..
    dockerfile: cuopt_agent/docker/Dockerfile.dev
  image: cuopt-agent-dev
  working_dir: /app/cuopt_agent
  volumes:
    - ../../cuopt_agent:/app/cuopt_agent
    - ../../skills:/app/skills
    - ../../AGENTS.md:/app/AGENTS.md
  env_file: ../../.env
  deploy:
    resources:
      reservations:
        devices:
          - driver: nvidia
            count: 1
            capabilities: [gpu]
  depends_on:
    - phoenix

services:
  cuopt-agent-dev:
    <<: *agent-common
    container_name: cuopt-agent-dev
    ports:
      - "8000:8000"
    stdin_open: true
    tty: true
    command: bash

  phoenix:
    image: arizephoenix/phoenix:latest
    container_name: cuopt-phoenix
    ports:
      - "6006:6006"
      - "4317:4317"

  nat-ui:
    build:
      context: ../../external/nat-ui
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_NAT_WORKFLOW: "cuOpt Agent"
        NEXT_PUBLIC_NAT_GREETING_TITLE: "cuOpt Optimization Agent"
        NEXT_PUBLIC_NAT_GREETING_SUBTITLE: "How can I help with your optimization problem?"
        NEXT_PUBLIC_NAT_ENABLE_INTERMEDIATE_STEPS: "true"
    image: cuopt-nat-ui
    container_name: cuopt-nat-ui
    ports:
      - "3000:3000"
    environment:
      - NAT_BACKEND_URL=http://cuopt-agent-dev:8000
      - PORT=3000
    depends_on:
      - cuopt-agent-dev
