general:
  telemetry:
    logging:
      console:
        _type: console
        level: WARN
    tracing:
      phoenix:
        _type: phoenix
        endpoint: http://phoenix:6006/v1/traces
        project: cuopt-agent
      # Uncomment to use LangSmith for tracing with your own LangSmith account.
      # langsmith:
      #   _type: langsmith
      #   project: cuopt-agent
      #   endpoint: "${LANGSMITH_ENDPOINT:-https://api.smith.langchain.com}/otel/v1/traces"
      #   api_key: ${LANGSMITH_API_KEY}

llms:
  cuopt_llm:
    _type: nim
    model: minimaxai/minimax-m2.5
    api_key: ${NVIDIA_API_KEY}
    base_url: https://integrate.api.nvidia.com/v1/
    max_tokens: 16384    

functions:
  healthcheck:
    _type: healthcheck

workflow:
  _type: deepagent_fn
  llm_name: cuopt_llm
  description: "Supply-chain optimization assistant powered by NVIDIA cuOpt"
  tools: []
  skills_dir:
    - skills
  agents_md_path: AGENTS.md
  skills:
    - ".skills"
  memory:
    - "AGENTS.md"
  workspace_dirs:
    - cuopt_agent/data/max_supply_what_ifs/input
  max_retries: 2
  retry_backoff_factor: 2.0
  retry_initial_delay: 1.0
  retry_max_delay: 60.0
  system_prompt: |
    You are a supply-chain optimization coordinator powered by NVIDIA cuOpt.
    For optimization problems, delegate to the cuopt_sub_agent using the task() tool.
    For general questions, respond directly.
    Report the optimal objective value as a single float in \boxed{...} on the last line.
  subagents:
    - cuopt_sub_agent

eval:
  general:
    output_dir: /app/cuopt_skills/cuopt_agent/data/max_supply_what_ifs/eval/results
    verbose: true
    dataset:
        _type: csv
        file_path: /app/cuopt_skills/cuopt_agent/data/max_supply_what_ifs/eval/max_supply_what_ifs.csv
        id_key: id
        structure:
          question_key: question
          answer_key: answer
  evaluators:
    accuracy:
      _type: cuopt_objective
      tolerance: 1e-2