general:
  telemetry:
    logging:
      console:
        _type: console
        level: WARN
    tracing:
      phoenix:
        _type: phoenix
        endpoint: http://phoenix:6006/v1/traces
        project: cuopt-agent
      # Uncomment to use LangSmith for tracing with your own LangSmith account.
      # langsmith:
      #   _type: langsmith
      #   project: cuopt-agent
      #   endpoint: "${LANGSMITH_ENDPOINT:-https://api.smith.langchain.com}/otel/v1/traces"
      #   api_key: ${LANGSMITH_API_KEY}
  front_end:
    _type: fastapi
    endpoints:
      - path: /health
        method: GET
        description: Health check endpoint.
        function_name: healthcheck

llms:
  cuopt_llm:
    _type: nim
    model: minimaxai/minimax-m2.5
    api_key: ${NVIDIA_API_KEY}
    base_url: https://integrate.api.nvidia.com/v1/
    max_tokens: 16384

functions:
  healthcheck:
    _type: healthcheck

workflow:
  _type: orchestrator_agent
  llm_name: cuopt_llm
  description: "Supply-chain optimization assistant powered by NVIDIA cuOpt"
  tools: []
  skills_dir:
    - ../skills                  # agent-specific skills copied into the sandbox
  agents_md_path: ../AGENTS.md   # agent memory copied into the sandbox
  skills:
    - /skills/
  memory:
    - /AGENTS.md
  max_retries: 2
  retry_backoff_factor: 2.0
  retry_initial_delay: 1.0
  retry_max_delay: 60.0
  system_prompt: |
    You are a supply-chain optimization coordinator powered by NVIDIA cuOpt.
    For optimization problems, delegate to the cuopt_sub_agent using the task() tool.
    For general questions, respond directly.
  # system_prompt: |
  #   You are a supply-chain optimization assistant powered by NVIDIA cuOpt.
  #   Solve the following optimization problem using Python and the cuOpt solver.
  #   Only write files in your working directory. Do not ask follow-up questions.
  #   Reference your skills to understand latest API usage before getting started.
  #   Answer simple questions directly.
