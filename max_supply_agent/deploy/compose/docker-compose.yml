#
# Production compose for cuOpt NAT agent with UI.
#
# Start all services:
#   docker compose -f deploy/compose/docker-compose.yml up -d
#
# Run evaluation (one-shot):
#   docker compose -f deploy/compose/docker-compose.yml run --rm cuopt-agent-eval
#
# Open the UI at http://localhost:3000
# Open Phoenix tracing at http://localhost:6006

x-agent-common: &agent-common
  build:
    context: ../..
    dockerfile: cuopt_agent/docker/Dockerfile
  image: cuopt-agent:latest
  env_file: ../../.env
  deploy:
    resources:
      reservations:
        devices:
          - driver: nvidia
            count: 1
            capabilities: [gpu]
  depends_on:
    phoenix:
      condition: service_started

services:
  cuopt-agent:
    <<: *agent-common
    container_name: cuopt-agent
    ports:
      - "8000:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      start_period: 60s
      retries: 3

  cuopt-agent-eval:
    <<: *agent-common
    profiles:
      - eval
    command: nat eval --config_file /app/cuopt_agent/configs/config-deepagent-eval.yml

  phoenix:
    image: arizephoenix/phoenix:latest
    container_name: cuopt-phoenix
    ports:
      - "6006:6006"
      - "4317:4317"
    restart: unless-stopped

  nat-ui:
    build:
      context: ../../external/nat-ui
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_NAT_WORKFLOW: "cuOpt Agent"
        NEXT_PUBLIC_NAT_GREETING_TITLE: "cuOpt Optimization Agent"
        NEXT_PUBLIC_NAT_GREETING_SUBTITLE: "How can I help with your optimization problem?"
        NEXT_PUBLIC_NAT_ENABLE_INTERMEDIATE_STEPS: "true"
    image: cuopt-nat-ui
    container_name: cuopt-nat-ui
    ports:
      - "3000:3000"
    environment:
      - NAT_BACKEND_URL=http://cuopt-agent:8000
      - PORT=3000
    restart: unless-stopped
    depends_on:
      cuopt-agent:
        condition: service_healthy
